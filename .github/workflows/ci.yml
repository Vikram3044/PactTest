name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        working-directory: WiremockPact
        run: |
          docker compose -f src/test/java/com/ust/sdet/docker/docker-compose-pact-broker.yml down -v
          docker compose -f src/test/java/com/ust/sdet/docker/docker-compose-pact-broker.yml up -d --wait

      - name: Run Consumer Tests
        working-directory: WiremockPact
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Publish Contracts
        working-directory: WiremockPact
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=$GIT_SHA \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292

      - name: Run Provider Verification
        working-directory: WiremockPact
        run: |
          mvn -Dtest=OmsProviderVerification \
              -Dgit.sha=$GIT_SHA \
              -Dpactbroker.host=127.0.0.1 \
              -Dpactbroker.port=9292 \
              test

      - name: Record Provider Deployment
        working-directory: WiremockPact
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version $GIT_SHA \
            --environment production \
            --broker-base-url http://127.0.0.1:9292

      - name: Can I Deploy
        working-directory: WiremockPact
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version $GIT_SHA \
            --to-environment production \
            --broker-base-url http://127.0.0.1:9292